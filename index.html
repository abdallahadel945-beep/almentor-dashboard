<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>almentor — Project Portfolio Dashboard</title>
  <meta name="description" content="Live project portfolio performance dashboard for almentor executive team" />

  <!-- Favicon (red dash on black, mimicking the logo mark) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23000'/%3E%3Crect x='18' y='26' width='28' height='6' fill='%23ED1C24'/%3E%3C/svg%3E" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Libraries (UMD, no build step) — load order matters: React → PropTypes → Recharts -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script crossorigin src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <style>
    :root {
      /* Almentor brand */
      --brand-black: #0A0A0A;
      --brand-red: #ED1C24;
      --brand-red-soft: #FEE7E8;
      --brand-teal: #0B7A9E;
      --brand-teal-soft: #E0F0F5;
      --brand-gray: #E8E8E8;

      /* Surfaces */
      --bg: #FAFAF7;
      --surface: #FFFFFF;
      --surface-2: #F5F5F0;
      --border: #E8E8E2;
      --border-strong: #D4D4CC;

      /* Text */
      --text: #0A0A0A;
      --text-2: #4A4A45;
      --text-3: #8A8A82;
      --text-inv: #FFFFFF;

      /* Semantic */
      --good: #0F7A4D;
      --good-soft: #E3F5EC;
      --warn: #B8711A;
      --warn-soft: #FBEFDB;
      --bad: #ED1C24;
      --bad-soft: #FEE7E8;

      /* Typography */
      --font-ui: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;

      --radius: 10px;
      --radius-sm: 6px;
      --radius-lg: 14px;
      --shadow-sm: 0 1px 2px rgba(10, 10, 10, 0.04);
      --shadow: 0 2px 6px rgba(10, 10, 10, 0.05), 0 1px 2px rgba(10, 10, 10, 0.04);
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      font-feature-settings: "ss01", "cv11";
    }

    body {
      min-height: 100vh;
      background-image:
        radial-gradient(circle at 15% 8%, rgba(237, 28, 36, 0.03) 0%, transparent 40%),
        radial-gradient(circle at 85% 95%, rgba(11, 122, 158, 0.03) 0%, transparent 40%);
    }

    /* Top bar */
    .topbar {
      background: var(--brand-black);
      color: var(--text-inv);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 3px solid var(--brand-red);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-logo {
      position: relative;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      padding-top: 8px;
    }
    .brand-logo::before {
      content: "";
      position: absolute;
      top: 0;
      left: 22px;
      width: 24px;
      height: 3px;
      background: var(--brand-red);
    }

    .brand-divider {
      width: 1px;
      height: 24px;
      background: rgba(255, 255, 255, 0.15);
    }

    .brand-sub {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.01em;
    }

    .topbar-meta {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
    }

    .live-dot {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .live-dot .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22C55E;
      box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
      animation: pulse 2s infinite;
    }
    .live-dot.snapshot .dot { background: #F59E0B; animation: none; }
    .live-dot.error .dot { background: var(--brand-red); animation: none; }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6); }
      70% { box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
      100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }

    /* Container */
    .container {
      max-width: 1680px;
      margin: 0 auto;
      padding: 28px;
    }

    /* Headline */
    .headline {
      margin-bottom: 24px;
    }
    .headline h1 {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.025em;
      margin: 0 0 6px 0;
      line-height: 1.1;
    }
    .headline h1 .accent {
      color: var(--brand-red);
    }
    .headline p {
      margin: 0;
      font-size: 14px;
      color: var(--text-2);
      max-width: 720px;
    }

    /* Filters */
    .filters {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      align-items: end;
    }

    .filter-group label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-3);
      margin-bottom: 6px;
    }

    .filter-group select,
    .filter-group input {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 500;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .filter-group select:focus,
    .filter-group input:focus {
      border-color: var(--brand-black);
      box-shadow: 0 0 0 3px rgba(10, 10, 10, 0.08);
    }

    .filter-reset {
      background: var(--brand-black);
      color: #fff;
      border: none;
      padding: 9px 14px;
      border-radius: var(--radius-sm);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.02em;
    }
    .filter-reset:hover { background: #333; }

    .filter-count {
      font-size: 12px;
      color: var(--text-3);
      font-weight: 500;
      padding: 9px 0;
    }
    .filter-count strong {
      color: var(--brand-red);
      font-weight: 700;
      font-family: var(--font-mono);
    }

    /* Chip multi-select */
    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .chip {
      font-size: 11px;
      padding: 5px 9px;
      border-radius: 14px;
      border: 1px solid var(--border-strong);
      background: var(--surface);
      color: var(--text-2);
      cursor: pointer;
      font-family: var(--font-ui);
      font-weight: 500;
      transition: all 0.12s;
      user-select: none;
    }
    .chip:hover { border-color: var(--brand-black); }
    .chip.active {
      background: var(--brand-black);
      color: #fff;
      border-color: var(--brand-black);
    }

    /* KPI Strip */
    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 18px 16px 18px;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .kpi:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }
    .kpi .kpi-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-3);
      margin-bottom: 10px;
    }
    .kpi .kpi-value {
      font-family: var(--font-mono);
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.05;
      font-variant-numeric: tabular-nums;
    }
    .kpi .kpi-value.negative { color: var(--brand-red); }
    .kpi .kpi-value.positive { color: var(--good); }
    .kpi .kpi-sub {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .kpi .kpi-accent {
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: var(--brand-red);
    }
    .kpi.kpi-teal .kpi-accent { background: var(--brand-teal); }
    .kpi.kpi-green .kpi-accent { background: var(--good); }
    .kpi.kpi-warn .kpi-accent { background: var(--warn); }
    .kpi.kpi-black .kpi-accent { background: var(--brand-black); }
    .kpi.kpi-gray .kpi-accent { background: var(--text-3); }

    /* Grid */
    .grid-12 {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
      margin-bottom: 16px;
    }

    .col-3 { grid-column: span 3; }
    .col-4 { grid-column: span 4; }
    .col-5 { grid-column: span 5; }
    .col-6 { grid-column: span 6; }
    .col-7 { grid-column: span 7; }
    .col-8 { grid-column: span 8; }
    .col-9 { grid-column: span 9; }
    .col-12 { grid-column: span 12; }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .card-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title::before {
      content: "";
      width: 4px;
      height: 14px;
      background: var(--brand-red);
      border-radius: 1px;
    }
    .card-subtitle {
      font-size: 11px;
      color: var(--text-3);
      font-weight: 500;
    }

    /* Insights */
    .insights {
      background: linear-gradient(135deg, #0A0A0A 0%, #1A1A1A 100%);
      color: #fff;
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .insights::before {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 240px;
      height: 100%;
      background: radial-gradient(circle at top right, rgba(237, 28, 36, 0.2), transparent 60%);
      pointer-events: none;
    }
    .insights-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .insights-header h3 {
      margin: 0;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #fff;
    }
    .insights-header .badge {
      font-size: 9px;
      padding: 3px 7px;
      border-radius: 10px;
      background: var(--brand-red);
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.08em;
    }
    .insights-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }
    .insight {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .insight .icon {
      font-size: 20px;
      flex-shrink: 0;
      line-height: 1;
    }
    .insight .body {
      font-size: 12.5px;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.85);
    }
    .insight .body strong {
      color: #fff;
      font-weight: 700;
    }
    .insight .body .num {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
    }

    /* Table */
    .table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 12.5px;
    }
    .table th {
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-3);
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
      position: sticky;
      top: 0;
    }
    .table td {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }
    .table tbody tr:hover { background: var(--surface-2); }
    .table .num {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      text-align: right;
      font-weight: 500;
    }
    .table .num.negative { color: var(--brand-red); }
    .table .num.positive { color: var(--good); }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .status-pill .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .status-ontrack { background: var(--good-soft); color: var(--good); }
    .status-ontrack .pill-dot { background: var(--good); }
    .status-atrisk { background: var(--warn-soft); color: var(--warn); }
    .status-atrisk .pill-dot { background: var(--warn); }
    .status-critical { background: var(--bad-soft); color: var(--bad); }
    .status-critical .pill-dot { background: var(--bad); }
    .status-inprogress { background: var(--brand-teal-soft); color: var(--brand-teal); }
    .status-inprogress .pill-dot { background: var(--brand-teal); }
    .status-completed { background: #F0F0EA; color: var(--text-2); }
    .status-completed .pill-dot { background: var(--text-2); }
    .status-pending { background: #F0F0EA; color: var(--text-2); }
    .status-pending .pill-dot { background: var(--text-3); }

    .table-scroll {
      max-height: 420px;
      overflow-y: auto;
      margin: -20px -20px -20px -20px;
      padding: 0 20px;
    }

    /* Gantt */
    .gantt {
      font-size: 12px;
    }
    .gantt-row {
      display: grid;
      grid-template-columns: 200px 1fr;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px dashed var(--border);
      gap: 12px;
    }
    .gantt-row:last-child { border-bottom: none; }
    .gantt-label {
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .gantt-track {
      position: relative;
      height: 22px;
      background: var(--surface-2);
      border-radius: 4px;
    }
    .gantt-bar {
      position: absolute;
      top: 2px;
      height: 18px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      padding: 0 6px;
      font-size: 10px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
    }
    .gantt-bar.ontrack { background: var(--good); }
    .gantt-bar.atrisk { background: var(--warn); }
    .gantt-bar.critical { background: var(--bad); }
    .gantt-axis {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-3);
      margin-top: 8px;
      padding-left: 212px;
    }

    /* Waterfall */
    .waterfall-labels {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-top: 14px;
    }
    .waterfall-step {
      text-align: center;
    }
    .waterfall-step .step-name {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-3);
      margin-bottom: 4px;
    }
    .waterfall-step .step-value {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .waterfall-step .step-pct {
      font-size: 10px;
      color: var(--brand-red);
      font-weight: 600;
      margin-top: 2px;
    }

    /* PM Scorecard */
    .pm-row {
      display: grid;
      grid-template-columns: 200px 80px 1fr 80px;
      gap: 12px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .pm-row:last-child { border-bottom: none; }
    .pm-name { font-weight: 600; color: var(--text); }
    .pm-projects { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
    .pm-health-bar {
      display: flex;
      height: 10px;
      border-radius: 2px;
      overflow: hidden;
      background: var(--surface-2);
    }
    .pm-health-bar .seg-ontrack { background: var(--good); }
    .pm-health-bar .seg-atrisk { background: var(--warn); }
    .pm-health-bar .seg-critical { background: var(--bad); }
    .pm-value {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .pm-value.negative { color: var(--brand-red); }
    .pm-value.positive { color: var(--good); }

    /* Recharts customization */
    .recharts-cartesian-axis-tick-value {
      font-family: var(--font-mono) !important;
      font-size: 10.5px !important;
      fill: var(--text-3) !important;
    }
    .recharts-legend-item-text {
      font-size: 11.5px !important;
      color: var(--text-2) !important;
    }
    .recharts-default-tooltip {
      border-radius: 8px !important;
      border: 1px solid var(--border-strong) !important;
      box-shadow: var(--shadow) !important;
      font-family: var(--font-ui) !important;
      font-size: 12px !important;
    }
    .custom-tooltip {
      background: var(--brand-black);
      color: #fff;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      font-family: var(--font-ui);
    }
    .custom-tooltip .tt-title {
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.7);
    }
    .custom-tooltip .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      font-family: var(--font-mono);
      font-size: 11.5px;
      padding: 2px 0;
    }
    .custom-tooltip .tt-row .tt-label { color: rgba(255,255,255,0.7); }

    /* Loading & empty states */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      color: var(--text-3);
      font-size: 14px;
    }
    .loading-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--brand-red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-3);
      font-size: 13px;
    }

    /* Footer */
    .footer {
      margin-top: 32px;
      padding: 20px 0;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-3);
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .filters { grid-template-columns: repeat(3, 1fr); }
      .kpi-strip { grid-template-columns: repeat(3, 1fr); }
      .insights-grid { grid-template-columns: repeat(2, 1fr); }
      .col-3, .col-4, .col-5 { grid-column: span 6; }
      .col-6, .col-7, .col-8, .col-9 { grid-column: span 12; }
    }

    @media (max-width: 720px) {
      .topbar { padding: 14px 16px; flex-wrap: wrap; }
      .container { padding: 16px; }
      .filters { grid-template-columns: 1fr 1fr; }
      .kpi-strip { grid-template-columns: 1fr 1fr; }

    const parseNum = (v) => {
      if (v === null || v === undefined || v === "") return 0;

      const s = String(v).replace(/,/g, "").replace(/[^\d.\-]/g, "");
      const n = parseFloat(s);
      return isNaN(n) ? 0 : n;
    };

    const parseDate = (s) => {
      if (!s) return null;
      if (s instanceof Date) return s;
      // Formats: "04-Jun-2023", "2023-06-04", "6/4/2023"
      const str = String(s).trim();
      // "04-Jun-2023" format
      const m = str.match(/^(\d{1,2})[-\/\s]([A-Za-z]{3,})[-\/\s](\d{4})$/);
      if (m) {
        const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        const month = months.findIndex(mo => mo.toLowerCase() === m[2].toLowerCase().slice(0,3));
        if (month >= 0) return new Date(parseInt(m[3]), month, parseInt(m[1]));
      }
      const d = new Date(str);
      return isNaN(d.getTime()) ? null : d;
    };

    const fmtMoney = (n) => {
      if (n === null || n === undefined || isNaN(n)) return "$0";
      const neg = n < 0;
      const abs = Math.abs(n);
      let s;
      if (abs >= 1_000_000) s = "$" + (abs / 1_000_000).toFixed(2) + "M";
      else if (abs >= 1_000) s = "$" + (abs / 1_000).toFixed(1) + "K";
      else s = "$" + Math.round(abs).toLocaleString();
      return neg ? "-" + s : s;
    };

    const fmtMoneyFull = (n) => {
      if (n === null || n === undefined || isNaN(n)) return "$0";
      const neg = n < 0;
      const abs = Math.abs(n);
      return (neg ? "-" : "") + "$" + Math.round(abs).toLocaleString();
    };

    const fmtPct = (n) => {
      if (n === null || n === undefined || isNaN(n)) return "0%";
      return (n >= 0 ? "" : "") + n.toFixed(1) + "%";

      if (!d) return "—";

    ];

      const out = { ...row };
      NUM_FIELDS.forEach(f => { out[f] = parseNum(row[f]); });
      out._startDate = parseDate(row["Start Date"]);
      out._endDate = parseDate(row["End Date"]);
      // Derived metrics
      out._gpMarginBaselinePct = out["Contracted Revenues (USD)"] > 0
        ? (out["GP Baseline (USD)"] / out["Contracted Revenues (USD)"]) * 100 : 0;

        ? ((out["Actual Costs (USD)"] - out["Cost Basline (USD)"]) / out["Cost Basline (USD)"]) * 100 : 0;

        ? (out["Collected Revenues (USD)"] / out["Invoiced Revenues (USD)"]) * 100 : 0;

    } = Recharts;

      const [state, setState] = React.useState({
        rows: [],
        loading: true,
        source: "loading", // 'live' | 'snapshot' | 'error'
        error: null,
        lastUpdated: null
      });

      const loadSnapshot = React.useCallback(() => {
        const rows = FALLBACK_DATA.map(normalizeRow);
        setState({
          rows,
          loading: false,
          source: "snapshot",
          error: null,
          lastUpdated: new Date()
        });
      }, []);

      const loadLive = React.useCallback(async () => {
        if (!SHEET_CSV_URL) return loadSnapshot();
        try {
          const response = await fetch(SHEET_CSV_URL);
          if (!response.ok) throw new Error("HTTP " + response.status);
          const text = await response.text();
          const parsed = Papa.parse(text, { header: true, skipEmptyLines: true, dynamicTyping: false });
          const rows = (parsed.data || [])
            .filter(r => r["Project Name"] && String(r["Project Name"]).trim().length > 0)
            .map(normalizeRow);
          if (rows.length === 0) throw new Error("No rows returned from sheet");
          setState({
            rows,
            loading: false,
            source: "live",
            error: null,
            lastUpdated: new Date()
          });

          console.warn("Live fetch failed, using snapshot:", err);
          const rows = FALLBACK_DATA.map(normalizeRow);
          setState({
            rows,
            loading: false,
            source: "error",
            error: err.message,
            lastUpdated: new Date()
          });
        }
      }, [loadSnapshot]);

        loadLive();
        if (SHEET_CSV_URL) {

      if (rows.length === 0) return null;

      const negativeProjects = rows.filter(r => r["GP Actual / Cash Flow (USD)"] < 0);

      const lossSorted = [...rows].sort((a,b) => a["GP Actual / Cash Flow (USD)"] - b["GP Actual / Cash Flow (USD)"]);
      const topLosers = lossSorted.slice(0, 3).filter(r => r["GP Actual / Cash Flow (USD)"] < 0);
      const top3Losses = topLosers.reduce((s, r) => s + r["GP Actual / Cash Flow (USD)"], 0);

      const bestPerformer = [...rows].sort((a,b) => b["GP Actual / Cash Flow (USD)"] - a["GP Actual / Cash Flow (USD)"])[0];

      const invoiced = rows.reduce((s, r) => s + r["Invoiced Revenues (USD)"], 0);
      const collected = rows.reduce((s, r) => s + r["Collected Revenues (USD)"], 0);
      const collectionRate = invoiced > 0 ? (collected/invoiced)*100 : 0;
      const unpaid = rows.reduce((s, r) => s + r["Unpaid Revenues (USD)"], 0);

      const contracted = rows.reduce((s, r) => s + r["Contracted Revenues (USD)"], 0);
      const atRiskExposure = rows
        .filter(r => ["At Risk","Critical"].includes(r["Health Status"]))
        .reduce((s, r) => s + r["Contracted Revenues (USD)"], 0);
      const atRiskPct = contracted > 0 ? (atRiskExposure/contracted)*100 : 0;

      const overruns = rows
        .filter(r => r["Cost Basline (USD)"] > 0 && r._costOverrunPct > 0)
        .sort((a,b) => b._costOverrunPct - a._costOverrunPct);
      const worstOverrun = overruns[0];

      const currencyExp = {};
      rows.forEach(r => {
        currencyExp[r.Currency] = (currencyExp[r.Currency] || 0) + r["Contracted Revenues (USD)"];
      });
      const topCurrency = Object.entries(currencyExp).sort((a,b) => b[1]-a[1])[0];
      const topCurrencyPct = contracted > 0 ? (topCurrency[1]/contracted)*100 : 0;

      const insights = [
        {
          icon: "⚠️",
          text: (
            <>
              <strong>{negativeProjects.length} of {rows.length} projects</strong> ({negPct.toFixed(0)}%) are running at a <strong>negative cash flow</strong>. The portfolio's margin reality is diverging sharply from baseline.
            </>
          )
        },
        {
          icon: "🔻",
          text: topLosers.length > 0 ? (
            <>
              Top loss-makers: <strong>{topLosers.map(r => r["Project Name"]).join(", ")}</strong> — combined loss of <span className="num">{fmtMoney(top3Losses)}</span>. Immediate review warranted.
            </>
          ) : <>No major loss-making projects in the current selection.</>
        },
        {
          icon: "💰",
          text: (
            <>
              Collection rate is <strong className="num">{collectionRate.toFixed(1)}%</strong> with <span className="num">{fmtMoney(unpaid)}</span> outstanding. Finance should prioritize AR follow-up on the largest unpaid balances.
            </>
          )
        },
        {
          icon: bestPerformer["GP Actual / Cash Flow (USD)"] >= 0 ? "✅" : "🎯",
          text: bestPerformer["GP Actual / Cash Flow (USD)"] >= 0 ? (
            <>
              Best performer: <strong>{bestPerformer["Project Name"]}</strong> ({bestPerformer["Project Manager"]}) at <span className="num">{fmtMoney(bestPerformer["GP Actual / Cash Flow (USD)"])}</span>. A potential playbook for the rest of the portfolio.
            </>
          ) : (
            <>
              No profitable projects in current view. Least unprofitable: <strong>{bestPerformer["Project Name"]}</strong> at <span className="num">{fmtMoney(bestPerformer["GP Actual / Cash Flow (USD)"])}</span>.
            </>
          )
        }
      ];

      if (worstOverrun) {
        insights.push({
          icon: "📊",
          text: (
            <>
              <strong>{worstOverrun["Project Name"]}</strong> has the largest cost overrun at <strong className="num">{worstOverrun._costOverrunPct.toFixed(1)}%</strong> above baseline ({fmtMoney(worstOverrun["Actual Costs (USD)"] - worstOverrun["Cost Basline (USD)"])} over).
            </>
          )
        });
      }

      insights.push({
        icon: "🌍",
        text: (
          <>
            Currency concentration: <strong className="num">{topCurrencyPct.toFixed(0)}%</strong> of contracted value is in <strong>{topCurrency[0]}</strong>. Consider FX hedging strategy.
          </>
        )
      });

      insights.push({
        icon: "🚨",
        text: (
          <>
            At-risk exposure: <strong className="num">{fmtMoney(atRiskExposure)}</strong> ({atRiskPct.toFixed(0)}% of contracted revenue) sits in At Risk / Critical projects.
          </>
        )
      });

      // Show first 4 (fits grid)
      const displayed = insights.slice(0, 4);

      return (
        <div className="insights">
          <div className="insights-header">
            <h3>Auto-Generated Insights</h3>
            <span className="badge">LIVE</span>
          </div>
          <div className="insights-grid">
            {displayed.map((ins, i) => (
              <div key={i} className="insight">
                <span className="icon">{ins.icon}</span>
                <div className="body">{ins.text}</div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // Chart: Revenue Leakage Waterfall
    const RevenueWaterfall = ({ rows }) => {
      const contracted = rows.reduce((s, r) => s + r["Contracted Revenues (USD)"], 0);
      const recognized = rows.reduce((s, r) => s + r["Recognition Value (USD)"], 0);
      const invoiced = rows.reduce((s, r) => s + r["Invoiced Revenues (USD)"], 0);
      const collected = rows.reduce((s, r) => s + r["Collected Revenues (USD)"], 0);
      const unpaid = rows.reduce((s, r) => s + r["Unpaid Revenues (USD)"], 0);

      const data = [
        { name: "Contracted", value: contracted, color: BRAND_BLACK },
        { name: "Recognized", value: recognized, color: BRAND_TEAL },
        { name: "Invoiced", value: invoiced, color: "#3B9DBD" },
        { name: "Collected", value: collected, color: COLOR_GOOD },
        { name: "Outstanding", value: unpaid, color: BRAND_RED }
      ];

      const pct = (v) => contracted > 0 ? ((v/contracted)*100).toFixed(0) : 0;

      const CustomTooltip = ({ active, payload }) => {
        if (!active || !payload || !payload.length) return null;
        const p = payload[0].payload;
        return (
          <div className="custom-tooltip">
            <div className="tt-title">{p.name}</div>
            <div className="tt-row"><span className="tt-label">Amount</span><span>{fmtMoneyFull(p.value)}</span></div>
            <div className="tt-row"><span className="tt-label">% of contracted</span><span>{pct(p.value)}%</span></div>
          </div>
        );
      };

      return (
        <div>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={data} margin={{ top: 10, right: 10, left: 0, bottom: 5 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#EEE" vertical={false} />
              <XAxis dataKey="name" tickLine={false} axisLine={{ stroke: "#E5E5E0" }} />
              <YAxis
                tickFormatter={(v) => fmtMoney(v)}
                tickLine={false}
                axisLine={false}
              />
              <Tooltip content={<CustomTooltip />} cursor={{ fill: "rgba(237, 28, 36, 0.05)" }} />
              <Bar dataKey="value" radius={[4, 4, 0, 0]}>
                {data.map((d, i) => <Cell key={i} fill={d.color} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
          <div className="waterfall-labels">
            {data.map(d => (
              <div key={d.name} className="waterfall-step">
                <div className="step-name">{d.name}</div>
                <div className="step-value">{fmtMoney(d.value)}</div>
                <div className="step-pct">{pct(d.value)}%</div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // Chart: Health Donut
    const HealthDonut = ({ rows }) => {
      const counts = { "On Track": 0, "At Risk": 0, "Critical": 0 };
      rows.forEach(r => { counts[r["Health Status"]] = (counts[r["Health Status"]] || 0) + 1; });
      const data = [
        { name: "On Track", value: counts["On Track"], color: COLOR_ONTRACK },
        { name: "At Risk", value: counts["At Risk"], color: COLOR_ATRISK },
        { name: "Critical", value: counts["Critical"], color: COLOR_CRITICAL }
      ].filter(d => d.value > 0);
      const total = data.reduce((s, d) => s + d.value, 0);

      const CustomTooltip = ({ active, payload }) => {
        if (!active || !payload || !payload.length) return null;
        const p = payload[0].payload;
        return (
          <div className="custom-tooltip">
            <div className="tt-title">{p.name}</div>
            <div className="tt-row"><span className="tt-label">Projects</span><span>{p.value}</span></div>
            <div className="tt-row"><span className="tt-label">Share</span><span>{((p.value/total)*100).toFixed(0)}%</span></div>
          </div>
        );
      };

      return (
        <div style={{position: "relative"}}>
          <ResponsiveContainer width="100%" height={240}>
            <PieChart>
              <Pie
                data={data}
                cx="50%"
                cy="50%"
                innerRadius={60}
                outerRadius={90}
                paddingAngle={2}
                dataKey="value"
                stroke="none"
              >
                {data.map((d, i) => <Cell key={i} fill={d.color} />)}
              </Pie>
              <Tooltip content={<CustomTooltip />} />
              <Legend
                verticalAlign="bottom"
                iconType="circle"
                iconSize={8}
                wrapperStyle={{ fontSize: 12, paddingTop: 8 }}
              />
            </PieChart>
          </ResponsiveContainer>
          <div style={{
            position: "absolute",
            top: "42%",
            left: "50%",
            transform: "translate(-50%, -50%)",
            textAlign: "center",
            pointerEvents: "none"
          }}>
            <div style={{fontSize: 26, fontWeight: 700, fontFamily: "var(--font-mono)", letterSpacing: "-0.02em"}}>
              {total}
            </div>
            <div style={{fontSize: 10, color: "var(--text-3)", fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", marginTop: 2}}>
              Projects
            </div>
          </div>
        </div>
      );
    };

    // Chart: Operational Status
    const OperationalStatus = ({ rows }) => {
      const counts = { "Pending": 0, "In Progress": 0, "Completed": 0 };
      rows.forEach(r => { counts[r["Operational Status"]] = (counts[r["Operational Status"]] || 0) + 1; });
      const data = Object.entries(counts).map(([name, value]) => ({ name, value }));

      return (
        <ResponsiveContainer width="100%" height={240}>
          <BarChart data={data} layout="vertical" margin={{ top: 10, right: 30, left: 10, bottom: 10 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#EEE" horizontal={false} />
            <XAxis type="number" tickLine={false} axisLine={false} allowDecimals={false} />
            <YAxis type="category" dataKey="name" tickLine={false} axisLine={false} width={90} />
            <Tooltip cursor={{ fill: "rgba(237, 28, 36, 0.05)" }} />
            <Bar dataKey="value" radius={[0, 4, 4, 0]}>
              {data.map((d, i) => (
                <Cell key={i} fill={
                  d.name === "Pending" ? "#C0C0B8" :
                  d.name === "In Progress" ? BRAND_TEAL :
                  BRAND_BLACK
                } />
              ))}
              <LabelList dataKey="value" position="right" style={{ fontFamily: "var(--font-mono)", fontSize: 12, fontWeight: 600, fill: "var(--text)" }} />
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      );
    };

    // Chart: Budget vs Actual Cost by Project
    const BudgetVsActual = ({ rows }) => {
      const data = rows
        .map(r => ({
          name: r["Project Name"].length > 26 ? r["Project Name"].slice(0, 24) + "…" : r["Project Name"],
          fullName: r["Project Name"],
          baseline: r["Cost Basline (USD)"],
          actual: r["Actual Costs (USD)"],
          overrun: r["Actual Costs (USD)"] - r["Cost Basline (USD)"]
        }))
        .sort((a,b) => b.actual - a.actual);

      const CustomTooltip = ({ active, payload }) => {
        if (!active || !payload || !payload.length) return null;
        const p = payload[0].payload;
        return (
          <div className="custom-tooltip">
            <div className="tt-title">{p.fullName}</div>
            <div className="tt-row"><span className="tt-label">Baseline</span><span>{fmtMoneyFull(p.baseline)}</span></div>
            <div className="tt-row"><span className="tt-label">Actual</span><span>{fmtMoneyFull(p.actual)}</span></div>
            <div className="tt-row"><span className="tt-label">Overrun</span><span style={{color: p.overrun > 0 ? BRAND_RED : COLOR_GOOD}}>{fmtMoneyFull(p.overrun)}</span></div>
          </div>
        );
      };

      return (
        <ResponsiveContainer width="100%" height={Math.max(280, data.length * 32)}>
          <BarChart data={data} layout="vertical" margin={{ top: 5, right: 60, left: 10, bottom: 5 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#EEE" horizontal={false} />
            <XAxis type="number" tickLine={false} axisLine={false} tickFormatter={fmtMoney} />
            <YAxis type="category" dataKey="name" tickLine={false} axisLine={false} width={180} tick={{ fontSize: 11 }} />
            <Tooltip content={<CustomTooltip />} cursor={{ fill: "rgba(0,0,0,0.03)" }} />
            <Legend wrapperStyle={{ fontSize: 11 }} />
            <Bar dataKey="baseline" name="Cost Baseline" fill={BRAND_TEAL} radius={[0, 2, 2, 0]} />
            <Bar dataKey="actual" name="Actual Cost" fill={BRAND_RED} radius={[0, 2, 2, 0]} />
          </BarChart>
        </ResponsiveContainer>
      );
    };

    // Chart: GP Baseline vs Actual Cash Flow
    const GPBaselineVsActual = ({ rows }) => {
      const data = rows
        .map(r => ({
          name: r["Project Name"].length > 22 ? r["Project Name"].slice(0, 20) + "…" : r["Project Name"],
          fullName: r["Project Name"],
          baseline: r["GP Baseline (USD)"],
          actual: r["GP Actual / Cash Flow (USD)"]
        }))
        .sort((a,b) => a.actual - b.actual);

      const CustomTooltip = ({ active, payload }) => {
        if (!active || !payload || !payload.length) return null;
        const p = payload[0].payload;
        const delta = p.actual - p.baseline;
        return (
          <div className="custom-tooltip">
            <div className="tt-title">{p.fullName}</div>
            <div className="tt-row"><span className="tt-label">GP Baseline</span><span>{fmtMoneyFull(p.baseline)}</span></div>
            <div className="tt-row"><span className="tt-label">GP Actual</span><span style={{color: p.actual >= 0 ? COLOR_GOOD : BRAND_RED}}>{fmtMoneyFull(p.actual)}</span></div>
            <div className="tt-row"><span className="tt-label">Variance</span><span style={{color: delta >= 0 ? COLOR_GOOD : BRAND_RED}}>{fmtMoneyFull(delta)}</span></div>
          </div>
        );
      };

      return (
        <ResponsiveContainer width="100%" height={Math.max(280, data.length * 32)}>
          <BarChart data={data} layout="vertical" margin={{ top: 5, right: 30, left: 10, bottom: 5 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#EEE" horizontal={false} />
            <XAxis type="number" tickLine={false} axisLine={false} tickFormatter={fmtMoney} />
            <YAxis type="category" dataKey="name" tickLine={false} axisLine={false} width={160} tick={{ fontSize: 11 }} />
            <Tooltip content={<CustomTooltip />} cursor={{ fill: "rgba(0,0,0,0.03)" }} />
            <Legend wrapperStyle={{ fontSize: 11 }} />
            <ReferenceLine x={0} stroke={BRAND_BLACK} strokeWidth={1.5} />
            <Bar dataKey="baseline" name="GP Baseline" fill={BRAND_TEAL} radius={[0, 2, 2, 0]} />
            <Bar dataKey="actual" name="GP Actual" radius={[0, 2, 2, 0]}>
              {data.map((d, i) => (
                <Cell key={i} fill={d.actual >= 0 ? COLOR_GOOD : BRAND_RED} />
              ))}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      );
    };

    // PM Scorecard
    const PMScorecard = ({ rows }) => {
      const byPM = {};
      rows.forEach(r => {
        const pm = r["Project Manager"];
        if (!byPM[pm]) byPM[pm] = { name: pm, projects: 0, contracted: 0, gp: 0, ontrack: 0, atrisk: 0, critical: 0 };
        byPM[pm].projects += 1;
        byPM[pm].contracted += r["Contracted Revenues (USD)"];
        byPM[pm].gp += r["GP Actual / Cash Flow (USD)"];
        if (r["Health Status"] === "On Track") byPM[pm].ontrack += 1;
        else if (r["Health Status"] === "At Risk") byPM[pm].atrisk += 1;
        else if (r["Health Status"] === "Critical") byPM[pm].critical += 1;
      });
      const pms = Object.values(byPM).sort((a,b) => b.contracted - a.contracted);

      return (
        <div>
          <div style={{display: "grid", gridTemplateColumns: "200px 80px 1fr 80px", gap: 12, padding: "0 0 8px 0", fontSize: 10, fontWeight: 700, color: "var(--text-3)", textTransform: "uppercase", letterSpacing: "0.08em", borderBottom: "2px solid var(--border)"}}>
            <span>Project Manager</span>
            <span style={{textAlign: "center"}}>Projects</span>
            <span>Health Mix</span>
            <span style={{textAlign: "right"}}>GP Actual</span>
          </div>
          {pms.map(pm => {
            const total = pm.ontrack + pm.atrisk + pm.critical;
            return (
              <div key={pm.name} className="pm-row">
                <span className="pm-name">{pm.name}</span>
                <span className="pm-projects" style={{textAlign: "center"}}>
                  {pm.projects} · {fmtMoney(pm.contracted)}
                </span>
                <div className="pm-health-bar">
                  {pm.ontrack > 0 && <div className="seg-ontrack" style={{width: (pm.ontrack/total)*100 + "%"}} title={pm.ontrack + " on track"}></div>}
                  {pm.atrisk > 0 && <div className="seg-atrisk" style={{width: (pm.atrisk/total)*100 + "%"}} title={pm.atrisk + " at risk"}></div>}
                  {pm.critical > 0 && <div className="seg-critical" style={{width: (pm.critical/total)*100 + "%"}} title={pm.critical + " critical"}></div>}
                </div>
                <span className={"pm-value " + (pm.gp >= 0 ? "positive" : "negative")}>{fmtMoney(pm.gp)}</span>
              </div>
            );
          })}
        </div>
      );
    };

    // Gantt Timeline
    const ProjectTimeline = ({ rows }) => {
      const valid = rows.filter(r => r._startDate && r._endDate).sort((a,b) => a._startDate - b._startDate);
      if (valid.length === 0) return <div className="empty-state">No dated projects in view</div>;

      const minDate = valid.reduce((m, r) => !m || r._startDate < m ? r._startDate : m, null);
      const maxDate = valid.reduce((m, r) => !m || r._endDate > m ? r._endDate : m, null);
      const totalMs = maxDate - minDate;

      const toPct = (d) => ((d - minDate) / totalMs) * 100;
      const healthClass = (h) => h === "On Track" ? "ontrack" : h === "At Risk" ? "atrisk" : "critical";

      return (
        <div className="gantt">
          {valid.map((r, i) => {
            const left = toPct(r._startDate);
            const width = toPct(r._endDate) - left;
            return (
              <div className="gantt-row" key={i}>
                <div className="gantt-label" title={r["Project Name"]}>{r["Project Name"]}</div>
                <div className="gantt-track">
                  <div
                    className={"gantt-bar " + healthClass(r["Health Status"])}
                    style={{ left: left + "%", width: Math.max(width, 2) + "%" }}
                    title={fmtDate(r._startDate) + " → " + fmtDate(r._endDate)}
                  >
                    {r["Project Duration (Months)"]}mo
                  </div>
                </div>
              </div>
            );
          })}
          <div className="gantt-axis">
            <span>{fmtDate(minDate)}</span>
            <span>{fmtDate(new Date((minDate.getTime() + maxDate.getTime()) / 2))}</span>
            <span>{fmtDate(maxDate)}</span>
          </div>
        </div>
      );
    };

    // Profitability Scatter
    const ProfitabilityScatter = ({ rows }) => {
      const data = rows.map(r => ({
        name: r["Project Name"],
        duration: r["Project Duration (Months)"],
        margin: r._gpMarginActualPct,
        contractSize: r["Contracted Revenues (USD)"],
        health: r["Health Status"]
      }));

      const byHealth = {
        "On Track": data.filter(d => d.health === "On Track"),
        "At Risk": data.filter(d => d.health === "At Risk"),
        "Critical": data.filter(d => d.health === "Critical")
      };

      const CustomTooltip = ({ active, payload }) => {
        if (!active || !payload || !payload.length) return null;
        const p = payload[0].payload;
        return (
          <div className="custom-tooltip">
            <div className="tt-title">{p.name}</div>
            <div className="tt-row"><span className="tt-label">Duration</span><span>{p.duration} months</span></div>
            <div className="tt-row"><span className="tt-label">Margin</span><span style={{color: p.margin >= 0 ? COLOR_GOOD : BRAND_RED}}>{p.margin.toFixed(1)}%</span></div>
            <div className="tt-row"><span className="tt-label">Contract</span><span>{fmtMoneyFull(p.contractSize)}</span></div>
            <div className="tt-row"><span className="tt-label">Status</span><span>{p.health}</span></div>
          </div>
        );
      };

      return (
        <ResponsiveContainer width="100%" height={280}>
          <ScatterChart margin={{ top: 10, right: 20, left: 0, bottom: 20 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#EEE" />
            <XAxis
              type="number"
              dataKey="duration"
              name="Duration"
              unit="mo"
              tickLine={false}
              axisLine={{ stroke: "#E5E5E0" }}
              label={{ value: "Duration (months)", position: "insideBottom", offset: -10, style: { fontSize: 11, fill: "var(--text-3)" } }}
            />
            <YAxis
              type="number"
              dataKey="margin"
              name="Margin"
              unit="%"
              tickLine={false}
              axisLine={false}
              label={{ value: "Margin %", angle: -90, position: "insideLeft", style: { fontSize: 11, fill: "var(--text-3)" } }}
            />
            <ZAxis type="number" dataKey="contractSize" range={[50, 500]} />
            <Tooltip content={<CustomTooltip />} cursor={{ strokeDasharray: "3 3" }} />
            <Legend wrapperStyle={{ fontSize: 11 }} />
            <ReferenceLine y={0} stroke={BRAND_BLACK} strokeWidth={1} />
            <Scatter name="On Track" data={byHealth["On Track"]} fill={COLOR_ONTRACK} />
            <Scatter name="At Risk" data={byHealth["At Risk"]} fill={COLOR_ATRISK} />
            <Scatter name="Critical" data={byHealth["Critical"]} fill={COLOR_CRITICAL} />
          </ScatterChart>
        </ResponsiveContainer>
      );
    };

    // Currency Mix
    const CurrencyMix = ({ rows }) => {
      const byC = {};
      rows.forEach(r => {
        byC[r.Currency] = (byC[r.Currency] || 0) + r["Contracted Revenues (USD)"];
      });
      const data = Object.entries(byC).map(([name, value]) => ({ name, value }));
      const colors = { USD: BRAND_BLACK, EGP: BRAND_RED, AED: BRAND_TEAL, SAR: "#8B5CF6" };
      const total = data.reduce((s, d) => s + d.value, 0);

      const CustomTooltip = ({ active, payload }) => {
        if (!active || !payload || !payload.length) return null;
        const p = payload[0].payload;
        return (
          <div className="custom-tooltip">
            <div className="tt-title">{p.name}</div>
            <div className="tt-row"><span className="tt-label">USD Value</span><span>{fmtMoneyFull(p.value)}</span></div>
            <div className="tt-row"><span className="tt-label">Share</span><span>{((p.value/total)*100).toFixed(1)}%</span></div>
          </div>
        );
      };

      return (
        <ResponsiveContainer width="100%" height={240}>
          <PieChart>
            <Pie
              data={data}
              cx="50%"
              cy="50%"
              outerRadius={85}
              dataKey="value"
              stroke="#fff"
              strokeWidth={2}
              label={({name, value}) => name + " " + ((value/total)*100).toFixed(0) + "%"}
              labelLine={false}
              style={{ fontSize: 11, fontWeight: 600 }}
            >
              {data.map((d, i) => <Cell key={i} fill={colors[d.name] || "#999"} />)}
            </Pie>
            <Tooltip content={<CustomTooltip />} />
          </PieChart>
        </ResponsiveContainer>
      );
    };

    // Collection Funnel
    const CollectionFunnel = ({ rows }) => {
      const invoiced = rows.reduce((s, r) => s + r["Invoiced Revenues (USD)"], 0);
      const collected = rows.reduce((s, r) => s + r["Collected Revenues (USD)"], 0);
      const unpaid = rows.reduce((s, r) => s + r["Unpaid Revenues (USD)"], 0);
      const notInvoiced = rows.reduce((s, r) => s + r["Not Invoiced Revenues (USD)"], 0);

      const data = [
        { name: "Not Invoiced", value: notInvoiced, color: "#C0C0B8" },
        { name: "Invoiced", value: invoiced, color: BRAND_TEAL },
        { name: "Collected", value: collected, color: COLOR_GOOD },
        { name: "Unpaid AR", value: unpaid, color: BRAND_RED }
      ];

      return (
        <ResponsiveContainer width="100%" height={240}>
          <BarChart data={data} layout="vertical" margin={{ top: 10, right: 60, left: 10, bottom: 10 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#EEE" horizontal={false} />
            <XAxis type="number" tickLine={false} axisLine={false} tickFormatter={fmtMoney} />
            <YAxis type="category" dataKey="name" tickLine={false} axisLine={false} width={100} tick={{ fontSize: 11 }} />
            <Tooltip
              formatter={(value) => [fmtMoneyFull(value), "Amount"]}
              cursor={{ fill: "rgba(0,0,0,0.03)" }}
            />
            <Bar dataKey="value" radius={[0, 4, 4, 0]}>
              {data.map((d, i) => <Cell key={i} fill={d.color} />)}
              <LabelList dataKey="value" position="right" formatter={fmtMoney} style={{ fontFamily: "var(--font-mono)", fontSize: 11, fontWeight: 600, fill: "var(--text)" }} />
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      );
    };

    // Critical Watchlist Table
    const CriticalWatchlist = ({ rows }) => {
      const watchlist = rows
        .filter(r => ["At Risk","Critical"].includes(r["Health Status"]))
        .sort((a,b) => a["GP Actual / Cash Flow (USD)"] - b["GP Actual / Cash Flow (USD)"]);

      const statusClass = (h) => {
        if (h === "On Track") return "status-pill status-ontrack";
        if (h === "At Risk") return "status-pill status-atrisk";
        if (h === "Critical") return "status-pill status-critical";
        if (h === "In Progress") return "status-pill status-inprogress";
        if (h === "Completed") return "status-pill status-completed";
        return "status-pill status-pending";
      };

      if (watchlist.length === 0) {
        return <div className="empty-state">✅ No at-risk or critical projects in the current selection.</div>;
      }

      return (
        <div className="table-scroll">
          <table className="table">
            <thead>
              <tr>
                <th>Project</th>
                <th>PM</th>
                <th>Health</th>
                <th>Op Status</th>
                <th style={{textAlign: "right"}}>Contract</th>
                <th style={{textAlign: "right"}}>Actual Cost</th>
                <th style={{textAlign: "right"}}>GP (Cash Flow)</th>
                <th style={{textAlign: "right"}}>Overrun</th>
              </tr>
            </thead>
            <tbody>
              {watchlist.map((r, i) => (
                <tr key={i}>
                  <td style={{fontWeight: 600}}>{r["Project Name"]}</td>
                  <td style={{color: "var(--text-2)"}}>{r["Project Manager"]}</td>
                  <td>
                    <span className={statusClass(r["Health Status"])}>
                      <span className="pill-dot"></span>
                      {r["Health Status"]}
                    </span>
                  </td>
                  <td>
                    <span className={statusClass(r["Operational Status"])}>
                      {r["Operational Status"]}
                    </span>
                  </td>
                  <td className="num">{fmtMoney(r["Contracted Revenues (USD)"])}</td>
                  <td className="num">{fmtMoney(r["Actual Costs (USD)"])}</td>
                  <td className={"num " + (r["GP Actual / Cash Flow (USD)"] >= 0 ? "positive" : "negative")}>
                    {fmtMoney(r["GP Actual / Cash Flow (USD)"])}
                  </td>
                  <td className={"num " + (r._costOverrunPct > 0 ? "negative" : "positive")}>
                    {r._costOverrunPct >= 0 ? "+" : ""}{r._costOverrunPct.toFixed(1)}%
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    };

    // All Projects Table (everything, sortable not implemented to keep scope)
    const AllProjectsTable = ({ rows }) => {
      const statusClass = (h) => {
        if (h === "On Track") return "status-pill status-ontrack";
        if (h === "At Risk") return "status-pill status-atrisk";
        if (h === "Critical") return "status-pill status-critical";
        if (h === "In Progress") return "status-pill status-inprogress";
        if (h === "Completed") return "status-pill status-completed";
        return "status-pill status-pending";
      };

      return (
        <div className="table-scroll">
          <table className="table">
            <thead>
              <tr>
                <th>Project</th>
                <th>PM</th>
                <th>Op</th>
                <th>Health</th>
                <th>CCY</th>
                <th style={{textAlign: "right"}}>Contract (USD)</th>
                <th style={{textAlign: "right"}}>Collected</th>
                <th style={{textAlign: "right"}}>Unpaid</th>
                <th style={{textAlign: "right"}}>Actual Cost</th>
                <th style={{textAlign: "right"}}>GP Actual</th>
                <th style={{textAlign: "right"}}>Margin %</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => (
                <tr key={i}>
                  <td style={{fontWeight: 600}}>{r["Project Name"]}</td>
                  <td style={{color: "var(--text-2)"}}>{r["Project Manager"]}</td>
                  <td><span className={statusClass(r["Operational Status"])}>{r["Operational Status"]}</span></td>
                  <td>
                    <span className={statusClass(r["Health Status"])}>
                      <span className="pill-dot"></span>
                      {r["Health Status"]}
                    </span>
                  </td>
                  <td style={{fontFamily: "var(--font-mono)", fontSize: 11}}>{r["Currency"]}</td>
                  <td className="num">{fmtMoney(r["Contracted Revenues (USD)"])}</td>
                  <td className="num">{fmtMoney(r["Collected Revenues (USD)"])}</td>
                  <td className="num negative">{fmtMoney(r["Unpaid Revenues (USD)"])}</td>
                  <td className="num">{fmtMoney(r["Actual Costs (USD)"])}</td>
                  <td className={"num " + (r["GP Actual / Cash Flow (USD)"] >= 0 ? "positive" : "negative")}>
                    {fmtMoney(r["GP Actual / Cash Flow (USD)"])}
                  </td>
                  <td className={"num " + (r._gpMarginActualPct >= 0 ? "positive" : "negative")}>
                    {r._gpMarginActualPct.toFixed(1)}%
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    };

    // ============================================================
    // Main App
    // ============================================================

    const App = () => {
      const data = useDashboardData();
      const [filters, setFilters] = React.useState({
        pms: [], ops: [], health: [], currency: [], search: ""
      });

      const filteredRows = React.useMemo(() => {
        return data.rows.filter(r => {
          if (filters.pms.length && !filters.pms.includes(r["Project Manager"])) return false;
          if (filters.ops.length && !filters.ops.includes(r["Operational Status"])) return false;
          if (filters.health.length && !filters.health.includes(r["Health Status"])) return false;
          if (filters.currency.length && !filters.currency.includes(r["Currency"])) return false;
          if (filters.search && !r["Project Name"].toLowerCase().includes(filters.search.toLowerCase())) return false;
          return true;
        });
      }, [data.rows, filters]);

      if (data.loading) {
        return (
          <>
            <TopBar source="loading" lastUpdated={null} onRefresh={data.refresh} />
            <div className="loading">
              <div className="loading-spinner"></div>
              Loading portfolio data…
            </div>
          </>
        );
      }

      return (
        <>
          <TopBar source={data.source} lastUpdated={data.lastUpdated} onRefresh={data.refresh} />
          <div className="container">
            <div className="headline">
              <h1>Project Portfolio <span className="accent">Intelligence</span></h1>
              <p>Real-time performance overview of all active projects — contracted revenue, collections, delivery cost, and margin health. Filter by manager, status, health, or currency to focus on what matters now.</p>
            </div>

            {data.source === "error" && (
              <div className="error-banner">
                <strong>Live feed unavailable.</strong> Showing last embedded snapshot. Details: {data.error}
              </div>
            )}

            <Filters
              rows={data.rows}
              filters={filters}
              setFilters={setFilters}
              filteredCount={filteredRows.length}
            />

            <KpiStrip rows={filteredRows} />

            <InsightsPanel rows={filteredRows} />

            {/* Row 1 — Revenue story */}
            <div className="grid-12">
              <div className="card col-8">
                <div className="card-header">
                  <div>
                    <div className="card-title">Revenue Leakage Waterfall</div>
                    <div className="card-subtitle">Contracted → Recognized → Invoiced → Collected → Outstanding</div>
                  </div>
                </div>
                <RevenueWaterfall rows={filteredRows} />
              </div>
              <div className="card col-4">
                <div className="card-header">
                  <div>
                    <div className="card-title">Portfolio Health</div>
                    <div className="card-subtitle">Distribution by status</div>
                  </div>
                </div>
                <HealthDonut rows={filteredRows} />
              </div>
            </div>

            {/* Row 2 — Operational & Collection */}
            <div className="grid-12">
              <div className="card col-4">
                <div className="card-header">
                  <div>
                    <div className="card-title">Operational Status</div>
                    <div className="card-subtitle">Pending · In Progress · Completed</div>
                  </div>
                </div>
                <OperationalStatus rows={filteredRows} />
              </div>
              <div className="card col-4">
                <div className="card-header">
                  <div>
                    <div className="card-title">Cash Collection Funnel</div>
                    <div className="card-subtitle">Revenue lifecycle in USD</div>
                  </div>
                </div>
                <CollectionFunnel rows={filteredRows} />
              </div>
              <div className="card col-4">
                <div className="card-header">
                  <div>
                    <div className="card-title">Currency Mix</div>
                    <div className="card-subtitle">Contracted value by currency (USD equivalent)</div>
                  </div>
                </div>
                <CurrencyMix rows={filteredRows} />
              </div>
            </div>

            {/* Row 3 — Cost & GP Comparison */}
            <div className="grid-12">
              <div className="card col-6">
                <div className="card-header">
                  <div>
                    <div className="card-title">Cost Baseline vs Actual</div>
                    <div className="card-subtitle">Where the budget burned — ranked by actual spend</div>
                  </div>
                </div>
                <BudgetVsActual rows={filteredRows} />
              </div>
              <div className="card col-6">
                <div className="card-header">
                  <div>
                    <div className="card-title">GP Baseline vs Actual Cash Flow</div>
                    <div className="card-subtitle">Plan vs reality — red bars are cash negative</div>
                  </div>
                </div>
                <GPBaselineVsActual rows={filteredRows} />
              </div>
            </div>

            {/* Row 4 — PM & Timeline */}
            <div className="grid-12">
              <div className="card col-6">
                <div className="card-header">
                  <div>
                    <div className="card-title">Project Manager Scorecard</div>
                    <div className="card-subtitle">Ranked by contracted value · health mix · net GP</div>
                  </div>
                </div>
                <PMScorecard rows={filteredRows} />
              </div>
              <div className="card col-6">
                <div className="card-header">
                  <div>
                    <div className="card-title">Project Timeline</div>
                    <div className="card-subtitle">Gantt view colored by health status</div>
                  </div>
                </div>
                <ProjectTimeline rows={filteredRows} />
              </div>
            </div>

            {/* Row 5 — Profitability scatter full width */}
            <div className="grid-12">
              <div className="card col-12">
                <div className="card-header">
                  <div>
                    <div className="card-title">Profitability Quadrant</div>
                    <div className="card-subtitle">Duration vs margin · bubble size = contract value · color = health</div>
                  </div>
                </div>
                <ProfitabilityScatter rows={filteredRows} />
              </div>
            </div>

            {/* Row 6 — Critical Watchlist */}
            <div className="grid-12">
              <div className="card col-12">
                <div className="card-header">
                  <div>
                    <div className="card-title">🚨 Critical Watchlist</div>
                    <div className="card-subtitle">Projects flagged At Risk or Critical — sorted by cash flow impact</div>
                  </div>
                </div>
                <CriticalWatchlist rows={filteredRows} />
              </div>
            </div>

            {/* Row 7 — Full Projects Table */}
            <div className="grid-12">
              <div className="card col-12">
                <div className="card-header">
                  <div>
                    <div className="card-title">All Projects</div>
                    <div className="card-subtitle">Complete register for the current filter selection</div>
                  </div>
                </div>
                <AllProjectsTable rows={filteredRows} />
              </div>
            </div>

            <div className="footer">
              <span>almentor · Project Portfolio Dashboard · Confidential</span>
              <span>
                {data.source === "live" ? "Live feed from Google Sheets" : "Embedded snapshot"}
                {data.lastUpdated && " · Updated " + data.lastUpdated.toLocaleString("en-GB")}
              </span>
            </div>
          </div>
        </>
      );
    };

    // Mount
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
