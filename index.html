<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>almentor — Project Portfolio Dashboard</title>
  <meta name="description" content="Live project portfolio performance dashboard for almentor executive team" />
  <meta property="og:title" content="almentor — Project Portfolio Dashboard" />
  <meta property="og:description" content="Real-time portfolio intelligence — revenue, collections, margin health" />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#0A0A0A" />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23000'/%3E%3Crect x='18' y='26' width='28' height='6' fill='%23ED1C24'/%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Pre-compiled — no Babel-standalone runtime. -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script crossorigin src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    /* ============================ Theme tokens ============================ */
    :root {
      --brand-black: #0A0A0A;
      --brand-red: #ED1C24;
      --brand-red-soft: #FEE7E8;
      --brand-teal: #0B7A9E;
      --brand-teal-soft: #E0F0F5;
      --brand-gray: #E8E8E8;
      --bg: #FAFAF7;
      --surface: #FFFFFF;
      --surface-2: #F5F5F0;
      --border: #E8E8E2;
      --border-strong: #D4D4CC;
      --text: #0A0A0A;
      --text-2: #4A4A45;
      --text-3: #8A8A82;
      --text-inv: #FFFFFF;
      --good: #0F7A4D;
      --good-soft: #E3F5EC;
      --warn: #B8711A;
      --warn-soft: #FBEFDB;
      --bad: #ED1C24;
      --bad-soft: #FEE7E8;
      --chart-grid: #EEEEE8;
      --topbar-bg: #0A0A0A;
      --topbar-text: #FFFFFF;
      --topbar-text-soft: rgba(255,255,255,0.7);
      --font-ui: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
      --radius: 10px;
      --radius-sm: 6px;
      --radius-lg: 14px;
      --shadow-sm: 0 1px 2px rgba(10, 10, 10, 0.04);
      --shadow: 0 2px 6px rgba(10, 10, 10, 0.05), 0 1px 2px rgba(10, 10, 10, 0.04);
    }

    /* Dark theme */
    html[data-theme="dark"] {
      --bg: #0E1014;
      --surface: #161A20;
      --surface-2: #1C2128;
      --border: #262B33;
      --border-strong: #353B45;
      --text: #F2F4F7;
      --text-2: #B6BBC4;
      --text-3: #8A909B;
      --text-inv: #0A0A0A;
      --brand-red-soft: #4A1418;
      --brand-teal-soft: #0F2C36;
      --good-soft: #0F2A20;
      --warn-soft: #3A2810;
      --bad-soft: #3A1416;
      --chart-grid: #262B33;
      --topbar-bg: #07080B;
      --topbar-text: #F2F4F7;
      --topbar-text-soft: rgba(255,255,255,0.65);
    }

    /* ============================ Reset / base ============================ */
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    html, body {
      margin: 0; padding: 0;
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      font-feature-settings: "ss01", "cv11";
      transition: background-color 0.2s, color 0.2s;
    }
    body {
      min-height: 100vh;
      background-image:
        radial-gradient(circle at 15% 8%, rgba(237, 28, 36, 0.03) 0%, transparent 40%),
        radial-gradient(circle at 85% 95%, rgba(11, 122, 158, 0.03) 0%, transparent 40%);
    }

    /* Skip link for keyboard users */
    .skip-link {
      position: absolute;
      left: -10000px; top: auto;
      width: 1px; height: 1px; overflow: hidden;
      background: var(--brand-red); color: #fff;
      padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: 600;
      z-index: 100;
    }
    .skip-link:focus {
      left: 16px; top: 12px; width: auto; height: auto;
      outline: 2px solid #fff; outline-offset: 2px;
    }

    /* Focus visible */
    button:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible {
      outline: 2px solid var(--brand-red);
      outline-offset: 2px;
    }

    /* ============================ Top bar ============================ */
    .topbar {
      background: var(--topbar-bg); color: var(--topbar-text);
      padding: 16px 28px; display: flex; align-items: center; justify-content: space-between;
      gap: 24px; position: sticky; top: 0; z-index: 50;
      border-bottom: 3px solid var(--brand-red);
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand-logo {
      position: relative; font-size: 22px; font-weight: 800; letter-spacing: -0.02em;
      color: var(--topbar-text); padding-top: 8px;
    }
    .brand-logo::before {
      content: ""; position: absolute; top: 0; left: 22px;
      width: 24px; height: 3px; background: var(--brand-red);
    }
    .brand-divider { width: 1px; height: 24px; background: rgba(255, 255, 255, 0.15); }
    .brand-sub { font-size: 13px; font-weight: 500; color: var(--topbar-text-soft); letter-spacing: 0.01em; }
    .topbar-meta { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--topbar-text-soft); }
    .topbar-btn {
      background: rgba(255,255,255,0.08); color: var(--topbar-text); border: 1px solid rgba(255,255,255,0.1);
      padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; font-family: var(--font-ui);
      cursor: pointer; transition: background 0.15s, transform 0.1s;
    }
    .topbar-btn:hover { background: rgba(255,255,255,0.16); }
    .topbar-btn:active { transform: scale(0.97); }
    .topbar-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .topbar-btn.theme-toggle { width: 60px; }

    .live-dot {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-radius: 20px;
      background: rgba(255, 255, 255, 0.08); font-weight: 500; letter-spacing: 0.02em;
    }
    .live-dot .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #22C55E; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
      animation: pulse 2s infinite;
    }
    .live-dot.snapshot .dot { background: #F59E0B; animation: none; }
    .live-dot.error .dot { background: var(--brand-red); animation: none; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6); }
      70% { box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
      100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }

    /* ============================ Container & headline ============================ */
    .container { max-width: 1680px; margin: 0 auto; padding: 28px; }
    .headline { margin-bottom: 24px; }
    .headline h1 {
      font-size: 34px; font-weight: 800; letter-spacing: -0.025em;
      margin: 0 0 6px 0; line-height: 1.1; color: var(--text);
    }
    .headline h1 .accent { color: var(--brand-red); }
    .headline p { margin: 0; font-size: 14px; color: var(--text-2); max-width: 720px; }

    /* ============================ Filters ============================ */
    .filters {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 20px;
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; align-items: start;
    }
    .filter-group label {
      display: block; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-3); margin-bottom: 6px;
    }
    .filter-group input[type="search"], .filter-group input[type="date"], .filter-group select {
      width: 100%; padding: 9px 10px;
      border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
      font-family: var(--font-ui); font-size: 13px; font-weight: 500;
      background: var(--surface); color: var(--text); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .filter-group input:focus {
      border-color: var(--text); box-shadow: 0 0 0 3px rgba(237, 28, 36, 0.15);
    }
    .filter-actions { display: flex; flex-direction: column; gap: 6px; align-items: stretch; justify-content: flex-end; }
    .filter-reset {
      background: var(--text); color: var(--surface); border: none;
      padding: 9px 14px; border-radius: var(--radius-sm);
      font-family: var(--font-ui); font-size: 12px; font-weight: 600; cursor: pointer;
      transition: background 0.15s; letter-spacing: 0.02em;
    }
    .filter-reset:hover { opacity: 0.85; }
    .filter-count { font-size: 12px; color: var(--text-3); font-weight: 500; padding: 4px 0; }
    .filter-count strong { color: var(--brand-red); font-weight: 700; font-family: var(--font-mono); }

    .chip-group { display: flex; flex-wrap: wrap; gap: 4px; }
    .chip {
      font-size: 11px; padding: 5px 9px; border-radius: 14px;
      border: 1px solid var(--border-strong); background: var(--surface);
      color: var(--text-2); cursor: pointer;
      font-family: var(--font-ui); font-weight: 500;
      transition: all 0.12s; user-select: none;
    }
    .chip:hover { border-color: var(--text); }
    .chip.active { background: var(--text); color: var(--text-inv); border-color: var(--text); }

    /* ============================ KPI Strip ============================ */
    .kpi-strip { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 20px; }
    .kpi {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px;
      position: relative; overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .kpi:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
    .kpi .kpi-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-3); margin-bottom: 10px;
    }
    .kpi .kpi-value {
      font-family: var(--font-mono); font-size: 26px; font-weight: 600;
      letter-spacing: -0.02em; color: var(--text); line-height: 1.05;
      font-variant-numeric: tabular-nums;
    }
    .kpi .kpi-value.negative { color: var(--brand-red); }
    .kpi .kpi-value.positive { color: var(--good); }
    .kpi .kpi-sub { font-size: 11px; color: var(--text-3); margin-top: 8px; }
    .kpi .kpi-delta {
      font-family: var(--font-mono); font-size: 11px; font-weight: 600;
      margin-top: 6px; display: inline-block; padding: 2px 6px;
      border-radius: 4px; letter-spacing: 0.02em;
    }
    .kpi .kpi-delta.positive { color: var(--good); background: var(--good-soft); }
    .kpi .kpi-delta.negative { color: var(--brand-red); background: var(--bad-soft); }
    .kpi .kpi-accent {
      position: absolute; top: 0; left: 0;
      width: 3px; height: 100%; background: var(--brand-red);
    }
    .kpi.kpi-teal .kpi-accent { background: var(--brand-teal); }
    .kpi.kpi-green .kpi-accent { background: var(--good); }
    .kpi.kpi-warn .kpi-accent { background: var(--warn); }
    .kpi.kpi-black .kpi-accent { background: var(--text); }
    .kpi.kpi-gray .kpi-accent { background: var(--text-3); }

    /* ============================ Grid & Card ============================ */
    .grid-12 { display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px; margin-bottom: 16px; }
    .col-3 { grid-column: span 3; }
    .col-4 { grid-column: span 4; }
    .col-5 { grid-column: span 5; }
    .col-6 { grid-column: span 6; }
    .col-7 { grid-column: span 7; }
    .col-8 { grid-column: span 8; }
    .col-9 { grid-column: span 9; }
    .col-12 { grid-column: span 12; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .card-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; gap: 12px; }
    .card-title {
      font-size: 14px; font-weight: 700; letter-spacing: -0.01em; color: var(--text);
      display: flex; align-items: center; gap: 8px; margin: 0;
    }
    .card-title::before {
      content: ""; width: 4px; height: 14px; background: var(--brand-red); border-radius: 1px;
    }
    .card-subtitle { font-size: 11px; color: var(--text-3); font-weight: 500; }

    /* ============================ Insights ============================ */
    .insights {
      background: linear-gradient(135deg, #0A0A0A 0%, #1A1A1A 100%);
      color: #fff; border-radius: var(--radius); padding: 24px 28px;
      margin-bottom: 20px; position: relative; overflow: hidden;
    }
    .insights::before {
      content: ""; position: absolute; top: 0; right: 0; width: 240px; height: 100%;
      background: radial-gradient(circle at top right, rgba(237, 28, 36, 0.2), transparent 60%);
      pointer-events: none;
    }
    .insights-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .insights-header h2 {
      margin: 0; font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em; color: #fff;
    }
    .insights-header .badge {
      font-size: 9px; padding: 3px 7px; border-radius: 10px;
      background: var(--brand-red); color: #fff; font-weight: 700; letter-spacing: 0.08em;
    }
    .insights-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .insight { display: flex; gap: 12px; align-items: flex-start; }
    .insight .icon { font-size: 20px; flex-shrink: 0; line-height: 1; color: var(--brand-red); font-weight: 800; }
    .insight .body { font-size: 12.5px; line-height: 1.5; color: rgba(255, 255, 255, 0.85); }
    .insight .body strong { color: #fff; font-weight: 700; }
    .insight .body .num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

    /* ============================ Table ============================ */
    .table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12.5px; }
    .table th {
      text-align: left; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-3); padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2); position: sticky; top: 0;
    }
    .table th:hover { background: var(--border); color: var(--text); }
    .table td { padding: 10px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
    .table tbody tr:hover { background: var(--surface-2); }
    .table .num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; text-align: right; font-weight: 500; }
    .table .num .negative, .table td .negative { color: var(--brand-red); }
    .table .num .positive, .table td .positive { color: var(--good); }

    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 8px; border-radius: 10px; font-size: 10.5px;
      font-weight: 600; letter-spacing: 0.02em;
    }
    .status-pill .pill-dot { width: 6px; height: 6px; border-radius: 50%; }
    .status-ontrack { background: var(--good-soft); color: var(--good); }
    .status-ontrack .pill-dot { background: var(--good); }
    .status-atrisk { background: var(--warn-soft); color: var(--warn); }
    .status-atrisk .pill-dot { background: var(--warn); }
    .status-critical { background: var(--bad-soft); color: var(--bad); }
    .status-critical .pill-dot { background: var(--bad); }
    .status-inprogress { background: var(--brand-teal-soft); color: var(--brand-teal); }
    .status-inprogress .pill-dot { background: var(--brand-teal); }
    .status-completed, .status-pending { background: var(--surface-2); color: var(--text-2); }
    .status-completed .pill-dot { background: var(--text-2); }
    .status-pending .pill-dot { background: var(--text-3); }

    .table-scroll { max-height: 480px; overflow-y: auto; margin: -20px; padding: 0 20px; }

    /* ============================ Donut center ============================ */
    .donut-center {
      position: absolute; top: 42%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center; pointer-events: none;
    }
    .donut-num { font-size: 26px; font-weight: 700; font-family: var(--font-mono); letter-spacing: -0.02em; color: var(--text); }
    .donut-label { font-size: 10px; color: var(--text-3); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }

    /* ============================ Gantt ============================ */
    .gantt { font-size: 12px; }
    .gantt-row {
      display: grid; grid-template-columns: 200px 1fr;
      align-items: center; padding: 6px 0;
      border-bottom: 1px dashed var(--border); gap: 12px;
    }
    .gantt-row:last-child { border-bottom: none; }
    .gantt-label {
      font-size: 11.5px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .gantt-track { position: relative; height: 22px; background: var(--surface-2); border-radius: 4px; }
    .gantt-bar {
      position: absolute; top: 2px; height: 18px; border-radius: 3px;
      display: flex; align-items: center; padding: 0 6px;
      font-size: 10px; font-weight: 600; color: #fff;
      white-space: nowrap; overflow: hidden;
    }
    .gantt-bar.ontrack { background: var(--good); }
    .gantt-bar.atrisk { background: var(--warn); }
    .gantt-bar.critical { background: var(--bad); }
    .gantt-axis {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--text-3); margin-top: 8px; padding-left: 212px;
    }

    /* ============================ Waterfall ============================ */
    .waterfall-labels { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 14px; }
    .waterfall-step { text-align: center; }
    .waterfall-step .step-name {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-3); margin-bottom: 4px;
    }
    .waterfall-step .step-value {
      font-family: var(--font-mono); font-size: 15px; font-weight: 600;
      color: var(--text); font-variant-numeric: tabular-nums;
    }
    .waterfall-step .step-pct { font-size: 10px; color: var(--brand-red); font-weight: 600; margin-top: 2px; }

    /* ============================ PM Scorecard ============================ */
    .pm-header {
      display: grid; grid-template-columns: 200px 80px 1fr 80px;
      gap: 12px; padding: 0 0 8px 0; font-size: 10px;
      font-weight: 700; color: var(--text-3); text-transform: uppercase;
      letter-spacing: 0.08em; border-bottom: 2px solid var(--border);
    }
    .pm-row {
      display: grid; grid-template-columns: 200px 80px 1fr 80px;
      gap: 12px; align-items: center; padding: 10px 0;
      border-bottom: 1px solid var(--border); font-size: 12px;
    }
    .pm-row:last-child { border-bottom: none; }
    .pm-row-clickable { cursor: pointer; transition: background 0.12s; border-radius: 6px; padding: 10px; margin: 0 -10px; }
    .pm-row-clickable:hover { background: var(--surface-2); }
    .pm-row-clickable:focus { background: var(--surface-2); }
    .pm-name { font-weight: 600; color: var(--text); }
    .pm-projects { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
    .pm-health-bar { display: flex; height: 10px; border-radius: 2px; overflow: hidden; background: var(--surface-2); }
    .pm-health-bar .seg-ontrack { background: var(--good); }
    .pm-health-bar .seg-atrisk { background: var(--warn); }
    .pm-health-bar .seg-critical { background: var(--bad); }
    .pm-value {
      font-family: var(--font-mono); font-size: 12px; font-weight: 600;
      text-align: right; font-variant-numeric: tabular-nums;
    }
    .pm-value.negative { color: var(--brand-red); }
    .pm-value.positive { color: var(--good); }

    /* ============================ Recharts overrides ============================ */
    .recharts-cartesian-axis-tick-value {
      font-family: var(--font-mono) !important;
      font-size: 10.5px !important; fill: var(--text-3) !important;
    }
    .recharts-legend-item-text { font-size: 11.5px !important; color: var(--text-2) !important; }
    .recharts-default-tooltip {
      border-radius: 8px !important; border: 1px solid var(--border-strong) !important;
      box-shadow: var(--shadow) !important; font-family: var(--font-ui) !important;
      font-size: 12px !important; background: var(--surface) !important; color: var(--text) !important;
    }
    .recharts-tooltip-wrapper .recharts-default-tooltip { background: var(--surface) !important; }

    .custom-tooltip {
      background: #0A0A0A; color: #fff;
      padding: 10px 12px; border-radius: 8px; font-size: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25); font-family: var(--font-ui);
    }
    .custom-tooltip .tt-title {
      font-weight: 700; margin-bottom: 6px; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.06em; color: rgba(255,255,255,0.7);
    }
    .custom-tooltip .tt-row {
      display: flex; justify-content: space-between; gap: 16px;
      font-family: var(--font-mono); font-size: 11.5px; padding: 2px 0;
    }
    .custom-tooltip .tt-row .tt-label { color: rgba(255,255,255,0.7); }

    /* ============================ Loading & empty ============================ */
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--text-3); font-size: 14px; }
    .loading-spinner {
